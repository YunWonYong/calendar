services:
    postgres:
        image: postgres:16
        container_name: local-postgres
        environment:
            POSTGRES_USER: calendar
            POSTGRES_PASSWORD: Asd!23QwE4%6
            POSTGRES_DB: hswy
        ports:
            - "5432:5432"
        volumes:
            - "../storage/postgres:/var/lib/postgresql/data"
    redis:
        image: redis:7
        container_name: local-redis
        ports:
            - "6379:6379"
        volumes:
            - "../storage/redis:/data"
        command: redis-server --appendonly yes